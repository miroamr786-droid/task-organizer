<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Personal Course Organizer</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section>
            <h2>Add a New Course</h2>
            <p>Fill out the form below to add a new course to your organizer.</p>

            <form action="#">
                <label for="cname">Course Name:</label>
                <input type="text" id="cname" name="course_name" placeholder="e.g. Microprocessors" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" placeholder="Dr. Name" required>

                <label for="hours">Credit Hours:</label>
                <input type="number" id="hours" name="hours" min="1" max="5" required>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Add any extra details here..."></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Created by Marwan Amr - Spring 2026</p>
    </footer>

</body>
</html>
